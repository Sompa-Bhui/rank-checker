<!DOCTYPE html>
<html>
<head>
  <title>Rank Checker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <h2>🚀 Google Rank Checker</h2>

  <input id="keyword" placeholder="Enter keyword">
  <input id="domain" placeholder="Enter domain">

  <select id="location">
    <option value="United States">🇺🇸 USA</option>
    <option value="Canada">🇨🇦 Canada</option>
  </select>

  <button onclick="checkRank()">Check Rank</button>

  <h3 id="result"></h3>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
