<!DOCTYPE html>
<html>
<head>
  <title>Rank Checker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <h2>Google Rank Checker</h2>
  <input id="keyword" placeholder="Keyword (e.g. facebook)">
  <input id="domain" placeholder="Domain (e.g. facebook.com)">
  <select id="location">
    <option value="United States">USA</option>
    <option value="Canada">Canada</option>
  </select>
  <button onclick="checkRank()">Check Rank</button>
  <div id="result"></div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
