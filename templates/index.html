<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rank Checker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #1e3c72;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: green;
    }

    .loading {
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Google Rank Checker</h2>

  <input id="keyword" placeholder="Enter keyword">
  <input id="domain" placeholder="Enter domain">

  <button onclick="checkRank()">Check Rank</button>

  <div class="loading" id="loading"></div>
  <div class="result" id="result"></div>
</div>

<script>
async function checkRank() {
    let keyword = document.getElementById("keyword").value;
    let domain = document.getElementById("domain").value;

    document.getElementById("loading").innerText = "Checking...";
    document.getElementById("result").innerText = "";

    let res = await fetch(`/api/rank?keyword=${keyword}&domain=${domain}`);
    let data = await res.json();

    document.getElementById("loading").innerText = "";
    document.getElementById("result").innerText = "Rank: " + data.rank;
}
</script>

</body>
</html>
